<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Lobster' rel='stylesheet'>
    <link href="https://fonts.cdnfonts.com/css/comic-neue" rel="stylesheet">
<style>
* {box-sizing: border-box}
body {
            margin: 0;
            width: 100%;
            font-size: 1.5vw;
            min-height: 100vh;
            background: #84A5B4;
        }
.container {
            margin: 0;
            font-family: 'Comic Sans MS','Comic Neue', sans-serif;
            background: #84A5B4;
            font-weight: '600';
            display: grid;
            width: 100%;
            min-height: 100%;
            grid-template-columns: 8% 56% 36%;
            grid-template-areas:
              "D B B"
              "D E E"
              "D C C"
              "D F G";
            }
  .A {
    grid-area: A;
    background: #84A5B4;
    vertical-align: middle;
    text-align: center;
    justify-content: center;
    display: flex;
    font-size: 3em;
    color: #FFFFFF;
  }
  
  .B {
    grid-area: B;
    background: #C4DAE4;
    display: block;
    justify-content: center;
    align-items: center;
    font-size: 1em;
    color: #FFFFFF;
  }

  .E {
    grid-area: E;
    background: #C4DAE4;
    display: block;
    justify-content: center;
    align-items: center;
    font-size: 1em;
    color: #FFFFFF;
  }

  .C {
    grid-area: C;
    background: #84A5B4;
    font-size: 1em;
    display: flex;
    line-height: 1.6;
    justify-content: center;  
    align-items: end;
  }
  .F {
    grid-area: F;
    background: #84A5B4;
    font-size: 1em;
    display: block;
    line-height: 1.6; 
  }
  .G {
    grid-area: G;
    background: #84A5B4;
    font-size: 1em;
    display: block;
    line-height: 1.6; 
  }
  .D {
    grid-area: D;
    background: #FFFFFF;
    display: sticky;
    color: #FFFFFF;
    font-size: 1em;
    transition: margin-left .5s;
    min-height: 100vh;
  }

  .map {
  position: relative;
  overflow: hidden;
  width: 100%;
  padding-bottom: 50%;
}

iframe {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  width: 100%;
  height: 100%;
  transform: translateX(20%);
}
  .imageOne {
  width: 100%;
}
.imageTwo {
  position: absolute;
}
.buttonOne{
        border: none;
        cursor: pointer;
        appearance: none;
        background-color: inherit;
        transition: transform .7s ease-in-out;

      }
      .sidenav {
  height: 100%;
  width: 0;
  position: fixed;
  z-index: 1;
  font-size: 2vw;
  top: 0;
  left: 0;
  background-color: #84A5B4;
  overflow-x: hidden;
  transition: 0.5s;
  padding-top: 5vw;
}

.sidenav a {
  padding: 1vw 1vw 1vw 4vw;
  text-decoration: none;
  font-size: 2vw;
  color: #FFFFFF;
  display: block;
  transition: 0.3s;
}

.sidenav a:hover {
  color: #C4DAE4;
}

.sidenav .closebtn {
  position: absolute;
  top: 0;
  right: 3vw;
  font-size: 2vw;
  margin-left: 5vw;
}

#floated-imgs{
  position: sticky;
  top: 0;
}
.imageThree {
  position: absolute;
  display: flex;
  z-index: 1;
  border: none;
  cursor: pointer;
  transform: translateY(-110%);
}
.imageFour {
  position: absolute;
  display: flex;
  z-index: 1;
  border: none;
  cursor: pointer;
  transform: translateY(60%);
}
.imageFive {
  position: absolute;
  display: flex;
  cursor:pointer;
  z-index: 1;
  border: none;
  transform: translateY(45%) translateX(300%);
}
  </style>
<title>About</title>
</head>
<body>
    <div class="container">
      <div class="D">
        <div id="floated-imgs">
          <center><a draggable="false" href="index.html"><img draggable="false" src="Cinnamon.png" style="width:7vw;"></a></center>
          <center><img draggable="false" src="Nav bar.png" style="width:6vw; cursor: pointer;" onclick="openNav()"></center>
        </div>
    </div>
        <div class="B">
          <br>
          <center><h1 style="font-family:'Lobster'; font-size:4vw;">= ABOUT =</h1></center>
          <center><img src="About.png" draggable="false" style="width:70%;"></center>
          <br>
        </div>
        <div class="E">
          <br>
          <img class="imageFive" draggable="false" src="Map.png" style="width:22vw;" onclick="Order()">
          <div class="map">
          <center><iframe style="width:70%;" src="https://www.google.com/maps/embed?pb=!1m13!1m8!1m3!1d3966.1607315035335!2d106.658985!3d-6.2425372!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zNsKwMTQnMzMuNCJTIDEwNsKwMzknMzcuOSJF!5e0!3m2!1sja!2sid!4v1698127025183!5m2!1sja!2sid" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></center>
          </div>
          <br>
          <br>
          <br>
       </div>
        <div class="C">
          <img src="Bottom.png" draggable="false" style="width:100%;">
          <img class="imageThree" draggable="false" src="Button.png" style="width:23%;" onclick="Order()">
          <br><br>
          <img class="imageFour" draggable="false" src="Top.png" style="width:20%;" onclick="topFunction()">
        </div>
        <div class="F">
          <p align="left" style="font-size: 3vw; color:#FFFFFF; transform: translateX(10%);"><b>Cinnamon's</b></p>
          <p align="left" style="font-size: 3vw; color:#FFFFFF; transform: translateX(10%) translateY(-65%);"><b>Kitchen</b></p>
          <p align="left" style="font-size: 1.2vw; color:#FFFFFF; transform: translateX(10%) translateY(-275%);"><b>123 Anywhere St., Any City</b></p>
      </div>
      <div class="G">
          <center><a draggable="false" href="Contact.html"><img align="center" draggable="false" src="Button2.png" style="width:55%; transform: translateY(55%);"></a></center>
          <div align="center"><a draggable="false" href="https://twitter.com"><img draggable="false" width="17%" height="17%" src="Twitter.png" style="transform: translateX(-25%) translateY(87%);"></a><a draggable="false" href="https://www.instagram.com/"><img draggable="false" width="15%" height="15%" src="Insta.png" style="transform: translateX(-7%) translateY(100%);"></a><a draggable="false" href="https://line.me/en/"><img draggable="false" width="15%" height="15%" src="Line.png" style="transform: translateX(25%) translateY(95%);"></a></div>
      </div>
      <div id="mySidenav" class="sidenav">
        <a draggable="false" href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a draggable="false" href="About.html">About</a>
        <a draggable="false" href="Menu.html">Menu</a>
        <a draggable="false" href="Order.html">Order</a>
      </div>
    </div>
    <script>
      function openNav() {
        document.getElementById("mySidenav").style.width = "20vw";
        document.getElementByClass("D").style.marginLeft = "20vw";
      }
      
      function closeNav() {
        document.getElementById("mySidenav").style.width = "0";
        document.getElementByClass("D").style.marginLeft= "0";
      }
      function topFunction() {
      window.scrollTo({top: 0, behavior: 'smooth'});
}
    function Order(){
    window.open("Order.html","_self")
    }
      </script>
</body>
</html>
