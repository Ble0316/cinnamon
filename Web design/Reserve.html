<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Lobster' rel='stylesheet'>
    <link href="https://fonts.cdnfonts.com/css/comic-neue" rel="stylesheet">
<style>
* {box-sizing: border-box}
body {
            margin: 0;
            width: 100%;
            font-size: 1.5vw;
            min-height: 100vh;
            background: #84A5B4;
        }
.container {
            margin: 0;
            font-family: 'Comic Sans MS','Comic Neue', sans-serif;
            background: #84A5B4;
            font-weight: '600';
            display: grid;
            width: 100%;
            min-height: 100%;
            grid-template-columns: 8% 56% 36%;
            grid-template-areas:
              "D B B"
              "D C C"
              "D F G";
            }
  
  .B {
    grid-area: B;
    background: #C4DAE4;
    display: block;
    justify-content: center;
    align-items: center;
    font-size: 1em;
    color: #FFFFFF;
  }

  .C {
    grid-area: C;
    background: #84A5B4;
    font-size: 1em;
    display: flex;
    line-height: 1.6;
    justify-content: center;  
    align-items: end;
  }
  .F {
    grid-area: F;
    background: #84A5B4;
    font-size: 1em;
    display: block;
    line-height: 1.6; 
  }
  .G {
    grid-area: G;
    background: #84A5B4;
    font-size: 1em;
    display: block;
    line-height: 1.6; 
  }
  .D {
    grid-area: D;
    background: #FFFFFF;
    display: sticky;
    color: #FFFFFF;
    font-size: 1em;
    transition: margin-left .5s;
    min-height: 100vh;
  }
  .imageOne {
  width: 100%;
}
.imageTwo {
  position: absolute;
}
.buttonOne{
        border: none;
        cursor: pointer;
        appearance: none;
        background-color: inherit;
        transition: transform .7s ease-in-out;
}
.buttonX{
        border: none;
        cursor: pointer;
        appearance: none;
        background-color: inherit;
        transition: transform .7s ease-in-out;
        margin-left: 5vw;
        margin-right: 5vw;
}
.sidenav {
  height: 100%;
  width: 0;
  position: fixed;
  z-index: 1;
  font-size: 2vw;
  top: 0;
  left: 0;
  background-color: #84A5B4;
  overflow-x: hidden;
  transition: 0.5s;
  padding-top: 5vw;
}

.sidenav a {
  padding: 1vw 1vw 1vw 4vw;
  text-decoration: none;
  font-size: 2vw;
  color: #FFFFFF;
  display: block;
  transition: 0.3s;
}

.sidenav a:hover {
  color: #C4DAE4;
}

.sidenav .closebtn {
  position: absolute;
  top: 0;
  right: 3vw;
  font-size: 2vw;
  margin-left: 5vw;
}

hr{
    border: 0.1vw solid #84A5B4;
    width: 80%;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

::placeholder {
  color: #84A5B4;
}

input:focus::placeholder {
  color: transparent;
}

input{
    border: none;
    border-color: transparent;
    background-color: transparent;
    font-family: 'Comic Sans MS', sans-serif;
    font-size: 1.5vw;
    color:#84A5B4;
}
td > input[type='text']
{
    width: 100%; 
}
select{
    border: none;
    border-color: transparent;
    background-color: transparent;
    font-family: 'Comic Sans MS', sans-serif;
    font-size: 1.5vw;
    color:#84A5B4;
    width:95%;
    text-align: center;
}

input:focus{
  outline: none;
}

select:focus{
  outline: none;
}

#floated-imgs{
  position: sticky;
  top: 0;
}
.imageThree {
  position: absolute;
  display: flex;
  z-index: 1;
  border: none;
  cursor: pointer;
  transform: translateY(-110%);
}
.imageFour {
  position: absolute;
  display: flex;
  z-index: 1;
  border: none;
  cursor: pointer;
  transform: translateY(60%);
}

  </style>
<title>Reserve</title>

                    <button class="buttonX" type="submit"><img draggable="false" src="Submit.png" style="width:15vw;"></button><button class="buttonX" type="reset" ><img draggable="false" src="Reset.png" style="width:15vw;"></button>
            <br>
            <br>
            <br>
        </form></center>
        </div>
        <div class="C">
          <img draggable="false" src="Bottom.png" style="width:100%;">
          <img draggable="false" class="imageThree" src="Button.png" style="width:23%;" onclick="Order()">
          <br><br>
          <img draggable="false" class="imageFour" src="Top.png" style="width:20%;" onclick="topFunction()">
        </div>
        <div class="F">
          <p align="left" style="font-size: 3vw; color:#FFFFFF; transform: translateX(10%);"><b>Cinnamon's</b></p>
          <p align="left" style="font-size: 3vw; color:#FFFFFF; transform: translateX(10%) translateY(-65%);"><b>Kitchen</b></p>
          <p align="left" style="font-size: 1.2vw; color:#FFFFFF; transform: translateX(10%) translateY(-275%);"><b>123 Anywhere St., Any City</b></p>
      </div>
      <div class="G">
          <center><a draggable="false" href="Contact.html"><img align="center" draggable="false" src="Button2.png" style="width:55%; transform: translateY(55%);"></a></center>

      <div id="mySidenav" class="sidenav">

    <script>
      function openNav() {
        document.getElementById("mySidenav").style.width = "20vw";
        document.getElementByClass("D").style.marginLeft = "20vw";
      }
      
      function closeNav() {
        document.getElementById("mySidenav").style.width = "0";
        document.getElementByClass("D").style.marginLeft= "0";
      }
      function topFunction() {
      window.scrollTo({top: 0, behavior: 'smooth'});
}

    }
      </script>

</html>
