<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Lobster' rel='stylesheet'>
    <link href="https://fonts.cdnfonts.com/css/comic-neue" rel="stylesheet">
<style>
* {box-sizing: border-box}
body {
            margin: 0;
            width: 100%;
            font-size: 1.5vw;
            min-height: 100vh;
            background: #84A5B4;
        }
.container {
            margin: 0;
            font-family: 'Comic Sans MS','Comic Neue', sans-serif;
            background: #84A5B4;
            font-weight: '600';
            display: grid;
            width: 100%;
            min-height: 100%;
            grid-template-columns: 8% 56% 36%;
            grid-template-rows: 10% 45% auto auto;
            grid-template-areas:
              "D B B"
              "D E E"
              "D C C"
              "D F G";
            }
  
  .B {
    grid-area: B;
    background: #C4DAE4;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1em;
    color: #FFFFFF;
  }

  .E {
    grid-area: E;
    background: #C4DAE4;
    display: block;
    justify-content: center;
    align-items: center;
    font-size: 1em;
    color: #FFFFFF;
  }

  .C {
    grid-area: C;
    background: #84A5B4;
    font-size: 1em;
    display: flex;
    line-height: 1.6;
    justify-content: center;  
    align-items: end;
  }
  .F {
    grid-area: F;
    background: #84A5B4;
    font-size: 1em;
    display: block;
    line-height: 1.6; 
  }
  .G {
    grid-area: G;
    background: #84A5B4;
    font-size: 1em;
    display: block;
    line-height: 1.6; 
  }
  .D {
    grid-area: D;
    background: #FFFFFF;
    display: sticky;
    color: #FFFFFF;
    font-size: 1em;
    transition: margin-left .5s;
    min-height: 100vh;
  }
  .imageOne {
  width: 100%;
}
.imageTwo {
  position: absolute;
}
.buttonOne{
        border: none;
        cursor: pointer;
        appearance: none;
        background-color: inherit;
        transition: transform .7s ease-in-out;
      }

      .buttona{
        border: none;
        cursor: pointer;
        appearance: none;
        justify-content: center;
        background-color: transparent;
        position: absolute;
        display: flex;
        z-index: 1;
        margin-left: 12%;
        margin-top: 5%;
      }

      .buttonb{
        border: none;
        cursor: pointer;
        appearance: none;
        justify-content: center;
        background-color: transparent;
        position: absolute;
        display: flex;
        float:right; 
        transform: translateX(170%);   
        z-index: 1;
        margin-top: 5%;
      }

      .sidenav {
  height: 100%;
  width: 0;
  position: fixed;
  z-index: 1;
  font-size: 2vw;
  top: 0;
  left: 0;
  background-color: #84A5B4;
  overflow-x: hidden;
  transition: 0.5s;
  padding-top: 5vw;
}

.sidenav a {
  padding: 1vw 1vw 1vw 4vw;
  text-decoration: none;
  font-size: 2vw;
  color: #FFFFFF;
  display: block;
  transition: 0.3s;
}

.sidenav a:hover {
  color: #C4DAE4;
}

.sidenav .closebtn {
  position: absolute;
  top: 0;
  right: 3vw;
  font-size: 2vw;
  margin-left: 5vw;
}

#floated-imgs{
  position: sticky;
  top: 0;
}
.imageThree {
  position: absolute;
  display: flex;
  z-index: 1;
  border: none;
  cursor: pointer;
  transform: translateY(-110%);
}
.imageFour {
  position: absolute;
  display: flex;
  z-index: 1;
  border: none;
  cursor: pointer;
  transform: translateY(60%);
}
.imageFive {
  position: absolute;
  display: flex;
  z-index: 1;
  border: none;
  transform: translateY(15%);
}
  </style>
<title>Order</title>
</head>
<body>
    <div class="container">
      <div class="D">
        <div id="floated-imgs">
          <center><a draggable="false" href="index.html"><img draggable="false" src="Cinnamon.png" style="width:7vw;"></a></center>
          <center><img draggable="false" src="Nav bar.png" style="width:6vw; cursor: pointer;" onclick="openNav()"></center>
        </div>
    </div>
        <div class="B">
          <br>
          <br>
          <br>
          <img draggable="false" class="imageFive" src="Title.png" style="width:30vw;">
          <br>
        </div>
        <div class="E">
            <img draggable="false" src="Bg.png" style="width:100%;">
            <img draggable="false" src="Delivery.png" class="buttonb" style="width:20%;" onclick="Delivery()">
            <img draggable="false" src="Reserve.png" class="buttona" style="width:20%;" onclick="Reserve()">
            <center><img draggable="false" src="Welcome.png" style="width:80%; transform: translateY(-50%);"> </center>
        </div>
        <div class="C">
          <img draggable="false" src="Bottom.png" style="width:100%;">
          <img draggable="false" class="imageThree" src="Button.png" style="width:23%;" onclick="Order()">
          <br><br>
          <img draggable="false" class="imageFour" src="Top.png" style="width:20%;" onclick="topFunction()">
        </div>
        <div class="F">
          <p align="left" style="font-size: 3vw; color:#FFFFFF; transform: translateX(10%);"><b>Cinnamon's</b></p>
          <p align="left" style="font-size: 3vw; color:#FFFFFF; transform: translateX(10%) translateY(-65%);"><b>Kitchen</b></p>
          <p align="left" style="font-size: 1.2vw; color:#FFFFFF; transform: translateX(10%) translateY(-275%);"><b>123 Anywhere St., Any City</b></p>
      </div>
      <div class="G">
          <center><a draggable="false" href="Contact.html"><img align="center" draggable="false" src="Button2.png" style="width:55%; transform: translateY(55%);"></a></center>
          <div align="center"><a draggable="false" href="https://twitter.com"><img draggable="false" width="17%" height="17%" src="Twitter.png" style="transform: translateX(-25%) translateY(87%);"></a><a draggable="false" href="https://www.instagram.com/"><img draggable="false" width="15%" height="15%" src="Insta.png" style="transform: translateX(-7%) translateY(100%);"></a><a draggable="false" href="https://line.me/en/"><img draggable="false" width="15%" height="15%" src="Line.png" style="transform: translateX(25%) translateY(95%);"></a></div>
      </div>
      <div id="mySidenav" class="sidenav">
        <a draggable="false" href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a draggable="false" href="About.html">About</a>
        <a draggable="false" href="Menu.html">Menu</a>
        <a draggable="false" href="Order.html">Order</a>
      </div>
    </div>
    <script>
      function openNav() {
        document.getElementById("mySidenav").style.width = "20vw";
        document.getElementByClass("D").style.marginLeft = "20vw";
      }
      
      function closeNav() {
        document.getElementById("mySidenav").style.width = "0";
        document.getElementByClass("D").style.marginLeft= "0";
      }
      function topFunction() {
      window.scrollTo({top: 0, behavior: 'smooth'});
}
    function Order(){
    window.open("Order.html","_self")
    }

    function Reserve(){
    window.open("Reserve.html","_self")
    }

    function Delivery(){
    window.open("Delivery.html","_self")
    }
      </script>
</body>
</html>
